# 任务难度划分
1. 任务所需步骤: 执行任务所需的指令的数量
2. 状态信息引入: 执行的任务是否需要考虑环境状态, 还是直接遵循人类的指令
3. 任务的复杂性: 执行任务需要考虑人类的抽象指令, 以及API调用间的逻辑关系, 而不是简单遵循

EASY: 少量的步骤, 不需要考虑状态信息, 直接遵循人类指令
Middle: 中等的步骤, 需要考虑一定的状态信息, 有一定的抽象指令的理解和代码推理能力
Hard: 较多的步骤, 较多的状态信息, 能够理解人类的较复杂的抽象指令, 良好的上下文代码的生成能力


